<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#04080f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="WorldView" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
    <link rel="apple-touch-icon" href="icon-192.png" />
    <title>WorldView — OSINT Command Center</title>
    <meta name="description" content="Real-time OSINT command center — flights, vessels, satellites, quakes, GPS-jamming on a single browser globe. Client-only, PWA, no backend." />
    <meta property="og:title" content="WorldView — OSINT Command Center" />
    <meta property="og:description" content="Real-time geospatial dashboard: live flights, vessels, satellites, seismic, GPS-jamming. Browser-only, installable as PWA." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://giuseppe84-code.github.io/Worldview-project/" />
    <meta property="og:image" content="https://giuseppe84-code.github.io/Worldview-project/og.png" />
    <!-- X (formerly Twitter) still reads the standard twitter:* card tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://giuseppe84-code.github.io/Worldview-project/og.png" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #04080f; overflow: hidden; overscroll-behavior: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("sw.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
